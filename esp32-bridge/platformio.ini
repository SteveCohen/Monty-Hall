; ─────────────────────────────────────────────────────────────────────────────
; ESP32 bitchat ↔ Meshtastic Bridge
; Target: Wemos LOLIN S3 Mini (ESP32-S3, 4 MB flash, 2 MB PSRAM)
; Framework: Arduino (via PlatformIO)
;
; NOTE: The ESP32-S2 Mini has NO Bluetooth; the S3 Mini is needed for BLE.
; To verify the board ID: pio boards | grep lolin_s3
; ─────────────────────────────────────────────────────────────────────────────

[env:lolin_s3_mini]
platform  = espressif32
board     = lolin_s3_mini
framework = arduino

; ── Libraries ────────────────────────────────────────────────────────────────
lib_deps =
    h2zero/NimBLE-Arduino @ ^1.4.3   ; BLE (lighter than Bluedroid)

; AsyncUDP is part of the ESP32 Arduino core — no extra dep needed.
; WiFiUdp is also part of the core.

; ── Build flags ───────────────────────────────────────────────────────────────
build_flags =
    -DARDUINO_USB_MODE=1          ; Use ESP32-S3 native USB
    -DARDUINO_USB_CDC_ON_BOOT=1   ; Serial over USB CDC
    -DCORE_DEBUG_LEVEL=3          ; Verbose ESP-IDF log (3=INFO, 4=DEBUG, 5=VERBOSE)
    -std=gnu++17
    -Wno-unused-variable

; ── Monitor / upload ─────────────────────────────────────────────────────────
monitor_speed  = 115200
upload_speed   = 921600
upload_protocol = esptool

; ── Source filter: include everything under src/ ─────────────────────────────
src_filter = +<*>
